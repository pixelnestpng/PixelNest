<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PexiNest AI</title>

    <link rel="stylesheet" href="chat.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>


        


        


<div class="app">

    <main class="main">

        <header class="topbar">
            <a href="javascript:history.back()" class="back-btn">
             <i class="fa-solid fa-arrow-left"></i>
            </a>

            <div class="logo-title">
                <a href="index.html">
                    <img src="logo/logo.png" alt="PexiNest Logo">
                </a>
             
             <h1>PexiNest AI</h1>
            </div>
            
        </header>

        <section class="chat-area">

            <div class="message-ai">

                <div class="avatar">
                    🤖
                </div>

                <div class="text">

                    <h3>PexiNest AI</h3>

                    <p>
                        👋 Welcome!<br><br>

                        I'm the official AI assistant for
                        <b>PexiNest</b>.

                        <br><br>

                        I can help you with everything related to this website.

                        Feel free to ask me anything!

                    </p>

                </div>

            </div>

        </section>

        <div class="input-area">

            <!-- زر مسح المحادثة -->
            <button class="Clear-Chat" title="Clear Chat">
                🗑️
            </button>

            <!-- مكان كتابة الرسالة -->
            <textarea
                placeholder="Message PexiNest AI..."
            ></textarea>

            <!-- زر الإرسال -->
            <button class="send-btn">
                Send
            </button>

        </div>

    </main>

</div>

<script src="knowledge.js"></script>
<script src="chat.js"></script>

</body>
</html>
