<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>404 - Page Not Found | PixelNest</title>

    <link rel="icon" type="image/png" href="logo/favicon.png">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:"Poppins",sans-serif;
        }

        body{

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:#ffffff;

        }

        .container{

            text-align:center;
            max-width:700px;
            padding:20px;

        }

        h1{

            font-size:140px;
            color:#2563EB;
            line-height:1;

        }

        h2{

            font-size:38px;
            margin:20px 0;
            color:#111827;

        }

        p{

            color:#6B7280;
            line-height:1.8;
            margin-bottom:35px;
            font-size:18px;

        }

        a{

            display:inline-flex;
            align-items:center;
            gap:10px;

            text-decoration:none;

            background:#2563EB;

            color:white;

            padding:15px 28px;

            border-radius:10px;

            transition:.3s;

            font-size:18px;

        }

        a:hover{

            background:#1D4ED8;

            transform:translateY(-3px);

        }

    </style>

</head>

<body>

    <div class="container">

        <h1>404</h1>

        <h2>Oops! Page Not Found</h2>

        <p>

            The page you are looking for doesn't exist or may have been moved.
            Return to the homepage and continue exploring thousands of free PNG images.

        </p>

        <a href="index.html">

            <i class="fa-solid fa-house"></i>

            Back to Home

        </a>

    </div>

</body>

</html>
